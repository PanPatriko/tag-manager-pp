<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TagManagerPP 2.0.0</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header>
        <button id="toggle-tag-sidebar" class="ico-bttn" data-i18n-title="header.sidebar"></button>
        <button id="theme-toggle" class="ico-bttn" data-i18n-title="header.theme"></button>
        <button id="open-settings-modal" class="ico-bttn" data-i18n-title="settings"></button>
        <div id="search-container">
            <input type="text" id="search-input" data-i18n-placeholder="header.searchPlaceholder">
            <button id="search-button" class="ico-bttn" data-i18n-title="common.search"></button>
            <ul id="search-suggestions" class="suggestions-container"></ul>
        </div>
        <div id="search-tags-container"></div>
        <button id="toggle-file-sidebar" class="ico-bttn" data-i18n-title="header.sidebar"></button>
    </header>

    <div id="app">
        <aside id="left-sidebar">
            <div id="left-resize-handle" class="left-sidebar-item resize-handle"></div>
            <div id="left-sidebar-menu" class="left-sidebar-item">
                <button id="location-button" class="menu-element ico-bttn" data-panel="location-panel"
                    data-i18n-title="loc.manageLocations"></button>
                <button id="tags-button" class="menu-element ico-bttn" data-panel="tags-panel"
                    data-i18n-title="tag.manageTags"></button>    
                <button id="file-tags-button" class="menu-element ico-bttn" data-panel="file-tags-panel"
                    data-i18n-title="fileInfo"></button>
            </div>
            <div id="tags-panel" class="left-sidebar-item">
                <button id="add-tag" class="ico-bttn" data-i18n-title="modal.tag.add"></button>
                <div id="tags-container" class="tags-view"></div>
            </div>
            <div id="location-panel" class="left-sidebar-item">        
                <div id="location-menu">
                    <button id="add-location" class="ico-bttn" data-i18n-title="modal.loc.add"></button>
                    <button id="find-files" class="ico-bttn" data-i18n-title="loc.findFiles"></button>
                    <progress id="find-files-loading-bar" class="hidden" value="0" max="100"></progress>
                </div>         
                <div id="location-container" class="location-view"></div>
                <div id="location-resize-handle" class="resize-handle"></div>
                <div id="directory-container"></div>
            </div>
            <div id="file-tags-panel" class="left-sidebar-item">
                <section id="file-info">
                    <table id="fileinfo-container">
                        <tr>
                            <td readonly data-i18n="fileInfo.name"></td>
                            <td>
                                <button id="file-name-save" data-i18n-title="common.save" disabled></button>
                                <input id="file-name"></input>
                            </td>
                        </tr>
                        <tr>
                            <td readonly data-i18n="fileInfo.path"></td>
                            <td>
                                <input id="file-path" readonly></input>
                            </td>                    
                        </tr>
                        <tr>
                            <td readonly data-i18n="fileInfo.id"></td>
                            <td>
                                <input id="file-id" readonly></input>
                            </td>
                        </tr>
                        <tr>
                            <td readonly data-i18n="fileInfo.size"></td>
                            <td>
                                <input id="file-size" readonly></input>
                            </td>
                        </tr>
                        <tr>
                            <td readonly data-i18n="fileInfo.creationDate"></td>
                            <td>
                                <input id="file-creation-date" readonly></input>
                            </td>
                        </tr>
                        <tr>
                            <td readonly data-i18n="fileInfo.modifiedDate"></td>
                            <td>
                                <input id="file-modified-date" readonly></input>
                            </td>
                        </tr>
                    </table>
                </section>
                <div id="file-tags-container" class="tags-view"></div>
            </div>
        </aside>

        <section id="content">
            <section id="files-bar">
                <div class="files-bar-group">
                    <button id="prev-button" class="ico-bttn" data-i18n-title="common.back"></button>
                    <button id="next-button" class="ico-bttn" data-i18n-title="common.next"></button>
                </div>
                
                <div class="files-bar-group">
                    <select id="sort-by-select">
                        <option value="name" data-i18n="content.sort.name"></option>
                        <option value="createDate" data-i18n="content.sort.createDate"></option>
                        <option value="modDate" data-i18n="content.sort.modDate"></option>
                        <option value="size" data-i18n="content.sort.size"></option>
                    </select>
                    <select id="sort-order-select">
                        <option value="asc" data-i18n="content.sort.asc"></option>
                        <option value="desc" data-i18n="content.sort.desc"></option>
                    </select>
                    <progress id="sort-loading-bar" class="hidden" value="0" max="100"></progress>
                </div>
                
                <div class="files-bar-group">
                    <button id="parent-directory" class="ico-bttn" data-i18n-title="content.upDir" disabled></button>
                    <button id="prev-page" class="ico-bttn" data-i18n-title="content.prevPage"></button>
                    <select id="file-pages"></select>
                    <button id="next-page" class="ico-bttn" data-i18n-title="content.nextPage"></button>
                </div>
                
                <div class="files-bar-group files-bar-info">
                    <input id="dir-name" class="hidden" readonly></input>
                    <input id="total-file-count" readonly></input>
                    <input id="current-files" readonly></input>
                    <input id="selected-file-count" readonly></input>
                </div>
            </section>
            <section id="files-panel">
            </section>
        </section>
        
        <aside id="right-sidebar">
            <div id="right-resize-handle" class="right-sidebar-item resize-handle"></div>
            <section id="file-container" class="right-sidebar-item">
                <div id="file-preview"></div>
            </section>
        </aside>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" id="close-settings-modal" data-i18n-title="common.close" tabindex="0">&times;</span>
            <h2 class="modal-title" data-i18n="settings"></h2>
            <div class="modal-body">
                <ul id="settings-container">
                    <li>
                        <span data-i18n="settings.language"></span>
                        <select id="language-select">
                            <option value="en" data-i18n="settings.language.en"></option>
                            <option value="pl" data-i18n="settings.language.pl"></option>
                        </select>
                    </li>
                    <hr>
                    <li>
                        <span data-i18n="settings.files"></span>
                    </li>
                    <li>
                        <span data-i18n="settings.files.iconSize"></span>
                        <select id="icon-size">
                            <option value="50">50px</option>
                            <option value="100">100px</option>
                            <option value="125">125px</option>
                            <option value="150">150px</option>
                            <option value="200">200px</option>
                        </select>
                    </li>
                    <li>
                        <span data-i18n="settings.files.maxFiles"></span>
                        <select id="max-files">
                            <option value="5">5</option>
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="250">250</option>
                            <option value="500">500</option>
                        </select>
                    </li>
                    <li>
                        <span data-i18n="settings.files.thumbnailGeneration"></span>
                        <input type="checkbox" id="thumb-gen">
                    </li>
                    <li>
                        <button id="clear-thumb-cache" data-i18n="settings.files.thumbnailClear"></button>
                    </li>
                    <hr>
                    <li>
                        <span data-i18n="settings.search"></span>
                    </li>
                    <li>
                        <span data-i18n="settings.search.searchBar"></span>
                        <select id="search-bar-mode">
                            <option value="1" data-i18n="settings.search.startsWith"></option>
                            <option value="2" data-i18n="settings.search.contains"></option>
                            <option value="3" data-i18n="settings.search.exact"></option>
                        </select>
                    </li>
                    <li>
                        <span data-i18n="settings.search.tagModal"></span>
                        <select id="tag-modal-mode">
                            <option value="1" data-i18n="settings.search.startsWith"></option>
                            <option value="2" data-i18n="settings.search.contains"></option>
                            <option value="3" data-i18n="settings.search.exact"></option>
                        </select>
                    </li>
                    <li>
                        <span data-i18n="settings.search.fileTagModal"></span>
                        <select id="file-tag-modal-mode">
                            <option value="1" data-i18n="settings.search.startsWith"></option>
                            <option value="2" data-i18n="settings.search.contains"></option>
                            <option value="3" data-i18n="settings.search.exact"></option>
                        </select>
                    </li>
                    <hr>
                    <li>
                        <span data-i18n="settings.video"></span>
                    </li>
                    <li>
                        <span data-i18n="settings.video.autoPlay"></span>
                        <input type="checkbox" id="vid-autoplay">
                    </li>                  
                    <li>
                        <span data-i18n="settings.video.loop"></span>
                        <input type="checkbox" id="vid-loop">
                    </li>
                    <hr>
                    <li>
                        <span data-i18n="settings.tag"></span>
                    </li>
                    <li>
                        <span data-i18n="settings.tag.bgColor"></span>
                        <input type="color" id="def-tag-bgcolor">
                    </li>
                    <li>
                        <span data-i18n="settings.tag.textColor"></span>
                        <input type="color" id="def-tag-textcolor">
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div id="tag-form-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" data-i18n-title="common.close" tabindex="0">&times;</span>
            <h2 class="modal-title" id="tag-modal-title"></h2>
            <div class="modal-body">
                <span data-i18n="modal.tag.name"></span>
                <input type="text" id="tag-name" data-i18n-placeholder="modal.tag.namePlaceholder"/>
                <span data-i18n="modal.tag.parentName"></span>
                <div id="parent-tag-search-container">
                    <input type="text" id="parent-name" data-i18n-placeholder="modal.tag.parentNamePlaceholder">
                    <ul id="parent-name-suggestions" class="suggestions-container hidden"></ul>
                </div>
                <div id="parent-tag"></div>
                <button id="clear-parent-tag" data-i18n="modal.tag.parentClear"></button>     
                <span data-i18n="modal.tag.bgColor"></span>
                <input type="color" id="color">
                <span data-i18n="modal.tag.textColor"></span>
                <input type="color" id="textcolor">
            </div>
            <div class="modal-footer">
                <button class="modal-cancel" id="tag-modal-cancel" data-i18n-title="common.cancel">✗</button>
                <button class="modal-confirm" id="tag-modal-ok" data-i18n-title="common.save">✓</button>
            </div>
        </div>
    </div>

    <div id="location-form-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" data-i18n-title="common.close" tabindex="0">&times;</span>
            <h2 id="loc-modal-title" class="modal-title"></h2>
            <div class="modal-body">
                <span data-i18n="modal.loc.name"></span>
                <input type="text" id="loc-name" data-i18n-placeholder="modal.loc.namePlaceholder">
                <span data-i18n="modal.loc.path"></span>
                <div class="loc-path-container">
                    <input type="text" id="loc-path" data-i18n-placeholder="modal.loc.pathPlaceholder" readonly>
                    <button id="loc-path-btn" data-i18n="common.browse"></button>
                </div>
            </div>
            <div class="modal-footer">           
                <button id="loc-modal-cancel" class="modal-cancel" data-i18n-title="common.cancel">✗</button>
                <button id="loc-modal-ok" class="modal-confirm" data-i18n-title="common.save">✓</button>
            </div>
        </div>
    </div>

    <div id="file-tag-form-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-file-tag-modal-button" class="modal-close" data-i18n-title="common.close" tabindex="0">&times;</span>
            <h2 class="modal-title" data-i18n="modal.fileTag.edit"></h2>
            <div class="modal-body">
                <div id="modal-file-tags-container"></div>
                <span data-i18n="modal.fileTag.search"></span>
                <input type="text" id="file-tag-search" data-i18n-placeholder="modal.fileTag.searchPlaceholder">
                <div>
                    <input type="checkbox" id="show-child-tags">
                    <span data-i18n="modal.fileTag.showChildTags"></span>
                </div>
                <div id="modal-file-tags-tree" class="tags-view"></div>
            </div>
            <div class="modal-footer">              
                <button id="remove-tags-button" class="modal-cancel" data-i18n-title="modal.fileTag.remove">–</button>
                <button id="add-tags-button" class="modal-confirm" data-i18n-title="modal.fileTag.add">+</button>
            </div>
        </div>
    </div>

    <script src="webpack/bundle.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
